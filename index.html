<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hilton Restaurant</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#fff;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#0f172a;
  color:white;
  padding:15px 20px;
}

.logo{
  font-size:22px;
  font-weight:bold;
}

.menu-icon{
  font-size:25px;
  cursor:pointer;
}

/* HERO */
.hero img{
  width:100%;
  height:320px;
  object-fit:cover;
}

/* SECTION TITLE */
h2{
  text-align:center;
  margin-top:30px;
  color:#0f172a;
}

/* SLIDER BOX */
.slider{
  width:80%;
  margin:20px auto;
  position:relative;
  height:250px;
  overflow:hidden;
  border-radius:12px;
  box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.slider img{
  width:100%;
  height:250px;
  object-fit:cover;
  position:absolute;
  top:0;
  left:0;
  opacity:0;
  transition:opacity 1s ease-in-out;
  border-radius:12px;
}

.slider img.active{
  opacity:1;
}
.map {
   text-align:center;
   margin:30px;
   }
/* FOOTER */
.footer{
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:40px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Hilton</div>
  <div class="menu-icon">☰</div>
</div>

<!-- HERO IMAGE (ONLY LIGHTHOUSE IMAGE) -->
<div class="hero">
  <img src="https://www.havelockone.com/hs-fs/hubfs/Gallery/Projects/Food%20and%20Beverage/UAE/Lighthouse/20220329_Havelock_TLH_YB-1.webp?width=1920&height=1080&name=20220329_Havelock_TLH_YB-1.webp">
</div>

<!-- MENU SECTION -->
<h2>Menu</h2>
<div class="slider" id="menuSlider">
  <img class="active" src="https://www.theworlds50best.com/stories/filestore/jpg/MENA25-TheList-Header.jpg">
  <img src="https://static.spotapps.co/spots/47/f7545746004e2e90d3a53a8430a4b7/:original">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcScwbncgLXCyYxf370F25biDh9QgNa0WwawtQ&s">
</div>

<!-- MEMORY SECTION -->
<h2>Memory</h2>
<div class="slider" id="memorySlider">
  <img class="active" src="https://static.spotapps.co/spots/47/f7545746004e2e90d3a53a8430a4b7/:original">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcScwbncgLXCyYxf370F25biDh9QgNa0WwawtQ&s">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSgJENkV7Ogl7WSFv31LgXj-luczz7lXF71ow&s">
</div>

<!-- AMBIANCE SECTION -->
<h2>Ambiance</h2>
<div class="slider" id="ambianceSlider">
  <img class="active" src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/0e/ce/7d/07/spectacular-views-at.jpg?w=900&h=500&s=1">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS52Mg1uk5PSFmXosLlYgEIZZFwPwDmPk1SDw&s">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSqae-IEIRtIGTo93grRa4Cl-10MQYaeQqYIg&s">
</div>
<div class="map">
<iframe 
src="https://www.google.com/maps?q=Lighthouse+Cafe+Dubai&output=embed"
width="80%" height="300" style="border:0;">
</iframe>
</div>
<!-- FOOTER -->
<div class="footer">
  <h3>Contact Us</h3>
  <p>Address: Main Road, City</p>
  <p>Email: info@hilton.com</p>
  <p>Phone: 03007011188</p>

</body>
</html>
